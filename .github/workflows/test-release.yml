name: '🧪 Test Release (dev)'

# Publishes a pre-release build from the dev branch and updates manifest-test.json,
# so it can be added as a second Jellyfin repository to install/try test builds
# through the normal plugin catalog — without touching main's stable releases.
on:
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  test-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Guard: skip if this commit was created by this workflow itself ──
      - name: Check commit author
        id: guard
        run: |
          AUTHOR=$(git log -1 --format='%ae')
          if [[ "$AUTHOR" == "github-actions[bot]@users.noreply.github.com" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Commit from github-actions bot – skipping to avoid loop."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Read versions from csproj ────────────────────────────────────────
      - name: Read versions
        if: steps.guard.outputs.skip == 'false'
        id: versions
        run: |
          PLUGIN=$(grep -oP '(?<=<Version>)[^<]+' \
            Jellyfin.Plugin.ActorsIndex/Jellyfin.Plugin.ActorsIndex.csproj | head -1)
          JVER=$(grep -oP '(?<=Jellyfin\.Controller" Version=")[^"]+' \
            Jellyfin.Plugin.ActorsIndex/Jellyfin.Plugin.ActorsIndex.csproj | head -1)
          echo "plugin=$PLUGIN"   >> "$GITHUB_OUTPUT"
          echo "jellyfin=$JVER"   >> "$GITHUB_OUTPUT"
          echo "Plugin: $PLUGIN  |  Jellyfin.Controller: $JVER"

      # ── Compute new plugin version (bump 4th component) ─────────────────
      - name: Compute new plugin version
        if: steps.guard.outputs.skip == 'false'
        id: newver
        run: |
          IFS='.' read -r a b c d <<< "${{ steps.versions.outputs.plugin }}"
          d=$((d + 1))
          NEW="$a.$b.$c.$d"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "New plugin version: $NEW"

      # ── Check if a test release for this version already exists ─────────
      - name: Check existing release
        if: steps.guard.outputs.skip == 'false'
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V="${{ steps.newver.outputs.version }}"
          if gh release view "test-v$V" &>/dev/null; then
            echo "exists=true"  >> "$GITHUB_OUTPUT"
            echo "Test release v$V already exists – nothing to do."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Setup .NET ───────────────────────────────────────────────────────
      - uses: actions/setup-dotnet@v4
        if: steps.guard.outputs.skip == 'false' && steps.check.outputs.exists == 'false'
        with:
          dotnet-version: '9.0.x'

      # ── Patch version numbers ─────────────────────────────────────────────
      - name: Patch version in csproj
        if: steps.guard.outputs.skip == 'false' && steps.check.outputs.exists == 'false'
        run: |
          PVER="${{ steps.newver.outputs.version }}"
          CSPROJ="Jellyfin.Plugin.ActorsIndex/Jellyfin.Plugin.ActorsIndex.csproj"
          sed -i "s|<Version>[^<]*</Version>|<Version>$PVER</Version>|g"                 "$CSPROJ"
          sed -i "s|<AssemblyVersion>[^<]*</AssemblyVersion>|<AssemblyVersion>$PVER</AssemblyVersion>|g" "$CSPROJ"
          sed -i "s|<FileVersion>[^<]*</FileVersion>|<FileVersion>$PVER</FileVersion>|g" "$CSPROJ"

      - name: Patch meta.json
        if: steps.guard.outputs.skip == 'false' && steps.check.outputs.exists == 'false'
        run: |
          PVER="${{ steps.newver.outputs.version }}"
          JVER="${{ steps.versions.outputs.jellyfin }}"
          python3 - <<PYEOF
          import json
          with open('Jellyfin.Plugin.ActorsIndex/meta.json') as f:
              data = json.load(f)
          data['version'] = "$PVER"
          data['changelog'] = 'Test build: compiled for Jellyfin $JVER (dev branch).'
          with open('Jellyfin.Plugin.ActorsIndex/meta.json', 'w') as f:
              json.dump(data, f, indent=2)
          PYEOF

      # ── Build ────────────────────────────────────────────────────────────
      - name: Build Release
        if: steps.guard.outputs.skip == 'false' && steps.check.outputs.exists == 'false'
        run: |
          dotnet publish --configuration=Release \
            Jellyfin.Plugin.ActorsIndex.sln \
            /property:GenerateFullPaths=true \
            /consoleloggerparameters:NoSummary

      # ── Package ──────────────────────────────────────────────────────────
      - name: Create ZIP and compute MD5
        if: steps.guard.outputs.skip == 'false' && steps.check.outputs.exists == 'false'
        id: package
        run: |
          PVER="${{ steps.newver.outputs.version }}"
          OUT="Jellyfin.Plugin.ActorsIndex/bin/Release/net9.0/publish"
          ZIP="Jellyfin.Plugin.Trombee-test_${PVER}.zip"
          zip -j "$ZIP" "$OUT/Jellyfin.Plugin.Trombee.dll" "$OUT/meta.json" "$OUT/thumb.png"
          MD5=$(md5sum "$ZIP" | cut -d' ' -f1)
          echo "zip=$ZIP"   >> "$GITHUB_OUTPUT"
          echo "md5=$MD5"   >> "$GITHUB_OUTPUT"

      # ── Update manifest-test.json (single entry, always overwritten) ────
      - name: Patch manifest-test.json
        if: steps.guard.outputs.skip == 'false' && steps.check.outputs.exists == 'false'
        run: |
          PVER="${{ steps.newver.outputs.version }}"
          JVER="${{ steps.versions.outputs.jellyfin }}"
          ZIP="${{ steps.package.outputs.zip }}"
          MD5="${{ steps.package.outputs.md5 }}"
          TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          SOURCE_URL="https://github.com/${{ github.repository }}/releases/download/test-v${PVER}/${ZIP}"
          python3 - <<PYEOF
          import json
          with open('manifest-test.json') as f:
              data = json.load(f)
          jver_parts = "$JVER".split('.')
          target_abi = f"{jver_parts[0]}.{jver_parts[1]}.0.0"
          data[0]['versions'] = [{
              "version": "$PVER",
              "changelog": "Test build: compiled for Jellyfin $JVER (dev branch).",
              "targetAbi": target_abi,
              "sourceUrl": "$SOURCE_URL",
              "checksum": "$MD5",
              "timestamp": "$TS"
          }]
          with open('manifest-test.json', 'w') as f:
              json.dump(data, f, indent=2)
          PYEOF

      # ── Commit version bump back to dev ──────────────────────────────────
      - name: Commit version bump
        if: steps.guard.outputs.skip == 'false' && steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Jellyfin.Plugin.ActorsIndex/Jellyfin.Plugin.ActorsIndex.csproj \
                  Jellyfin.Plugin.ActorsIndex/meta.json \
                  manifest-test.json
          git commit -m "Test-release v${{ steps.newver.outputs.version }} for Jellyfin ${{ steps.versions.outputs.jellyfin }}"
          git push origin HEAD:dev

      # ── Create GitHub Release (marked as pre-release) ────────────────────
      - name: Create GitHub Release
        if: steps.guard.outputs.skip == 'false' && steps.check.outputs.exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PVER="${{ steps.newver.outputs.version }}"
          JVER="${{ steps.versions.outputs.jellyfin }}"
          ZIP="${{ steps.package.outputs.zip }}"
          NOTES="Test build from the dev branch, compiled for Jellyfin **${JVER}**.\n\nNot merged into main — install at your own risk, may be unstable."
          gh release create "test-v$PVER" "$ZIP" \
            --title "Trombee Test v$PVER" \
            --notes "$NOTES" \
            --prerelease
