<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trombee</title>
</head>
<body>

<div id="ab-page" data-role="page" class="page">

<style>
    #ab-page, #ab-page * { box-sizing: border-box; }
    #ab-page { min-height: 100%; color: #eee; }
    .ab-trombee-host { padding: 0 !important; max-width: none !important; }
    .skinHeader .pageTitle.ab-trombee-page-title { display: inline-flex; align-items: center; gap: 8px; }
    .skinHeader .pageTitle.ab-trombee-page-title .ab-trombee-title-icon { font-size: 1.1em; line-height: 1; }
    #ab-compact-title { display: none; }
    #ab-header {
        text-align: center; padding: 12px 16px 10px; position: fixed; top: 60px;
        left: 0; right: 0; z-index: 150; background: #111; border-bottom: 1px solid #242424;
    }

    /* Search + pagination row */
    #ab-search-row {
        display: flex; align-items: center; justify-content: center;
        gap: 10px; width: 100%; max-width: 900px; margin: 0 auto;
    }
    #ab-search {
        flex: 1; min-width: 160px; height: 46px; padding: 0 16px;
        border-radius: 6px; background: #2a2a2a; border: 1px solid #444;
        color: #fff; font-size: 1.1rem;
    }
    #ab-search:focus { outline: 2px solid #0097e6; border-color: #0097e6; }

    /* Pagination */
    #ab-pager { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    #ab-page .ab-pg-btn {
        display: inline-flex; align-items: center; justify-content: center;
        width: 42px; height: 42px; padding: 0; border-radius: 4px; cursor: pointer;
        background: #2a2a2a; border: 1px solid #555; color: #ccc;
        font-size: 1rem; font-weight: bold; text-align: center;
    }
    #ab-page .ab-pg-btn:disabled { opacity: 0.3; cursor: default; }
    #ab-page .ab-pg-btn:hover:not(:disabled) { background: #383838; }
    #ab-pg-info { color: #aaa; font-size: 0.9rem; min-width: 64px; text-align: center; white-space: nowrap; }

    /* Status (inside sticky header) */
    #ab-status { min-height: 24px; padding: 4px 12px 0; color: #aaa; font-size: 0.88rem; text-align: center; margin-top: 4px; }

    /* Filters and sort controls */
    #ab-filter-toggle {
        display: none; align-items: center; justify-content: center; gap: 8px;
        min-height: 34px; padding: 4px 10px; border-radius: 4px; cursor: pointer;
        background: #2a2a2a; border: 1px solid #555; color: #ddd; font-size: 0.95rem;
    }
    #ab-page .ab-filter-chevron { display: inline-block; transition: transform 120ms ease; }
    #ab-filter-toggle[aria-expanded="true"] .ab-filter-chevron { transform: rotate(180deg); }
    #ab-sort-wrap { display: flex; justify-content: center; gap: 8px; width: 100%; max-width: 900px; margin: 8px auto 0; flex-wrap: wrap; }
    #ab-page .ab-sort-btn {
        min-height: 40px; padding: 7px 18px; border-radius: 4px; cursor: pointer;
        background: #2a2a2a; border: 1px solid #555; color: #ccc;
        font-size: 0.95rem; white-space: nowrap;
    }
    #ab-page .ab-sort-btn.active { background: #0097e6; border-color: #0097e6; color: #fff; }
    #ab-page .ab-type-select { min-height: 40px; padding: 7px 12px; border-radius: 4px; background: #2a2a2a; border: 1px solid #555; color: #ccc; font-size: 0.95rem; }
    #ab-page .ab-type-select:focus { outline: 2px solid #0097e6; border-color: #0097e6; }
    #ab-page .ab-lib-wrap { position: relative; display: inline-block; }
    #ab-page .ab-lib-panel {
        display: none; position: absolute; top: calc(100% + 6px); left: 0; z-index: 200;
        background: #222; border: 1px solid #555; border-radius: 6px; padding: 10px 14px;
        min-width: 220px; max-width: calc(100vw - 24px); max-height: min(320px, 45vh);
        overflow-y: auto; box-shadow: 0 4px 14px rgba(0,0,0,0.5);
        text-align: left;
    }
    #ab-page .ab-lib-panel.open { display: block; }
    #ab-page .ab-lib-row { display: flex; align-items: center; gap: 8px; min-height: 34px; padding: 5px 0; font-size: 0.95rem; color: #ddd; }
    #ab-page .ab-lib-row label { cursor: pointer; flex: 1; min-width: 0; overflow-wrap: anywhere; }
    #ab-page .ab-lib-row input[type="checkbox"] { cursor: pointer; }
    #ab-page .ab-lib-sep { border-top: 1px solid #444; margin: 6px 0; }
    #ab-page .ab-lib-all-row { font-weight: bold; }
    #ab-page .ab-sort-btn:hover:not(.active) { background: #383838; }

    /* Grid */
    #ab-grid {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 12px; padding: 14px 16px 32px; margin-top: 220px; /* fallback, overridden by JS */
    }
    #ab-page .ab-card { min-width: 0; background: #1c1c1c; border-radius: 6px; overflow: hidden; cursor: pointer; border: 2px solid transparent; outline: none; }
    #ab-page .ab-card:hover, #ab-page .ab-card:focus { border-color: #0097e6; }
    #ab-page .ab-card-img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; background: #2a2a2a; }
    #ab-page .ab-card-placeholder { width: 100%; aspect-ratio: 2/3; background: #252525; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: #555; }
    #ab-page .ab-card-info { min-height: 52px; padding: 7px 8px; }
    #ab-page .ab-card-name { font-size: 0.82rem; line-height: 1.2; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #ab-page .ab-card-count { font-size: 0.75rem; color: #888; margin-top: 4px; }

    /* Modal */
    #ab-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 1200; justify-content: center; align-items: flex-start; overflow-y: auto; overscroll-behavior: contain; padding: 32px 16px; }
    #ab-overlay.open { display: flex; }
    #ab-modal { background: #161616; border-radius: 8px; padding: 28px 32px; width: min(920px, calc(100vw - 32px)); position: relative; }
    #ab-modal-close { position: absolute; top: 8px; right: 8px; width: 44px; height: 44px; background: none; border: none; color: #aaa; font-size: 1.55rem; cursor: pointer; line-height: 1; padding: 0; z-index: 2; }
    #ab-modal-close:hover { color: #fff; }
    #ab-modal-close:focus { outline: 2px solid #0097e6; border-radius: 4px; }
    #ab-modal-header { display: flex; gap: 24px; margin-bottom: 24px; padding-right: 28px; }
    #ab-modal-img { width: 180px; height: 270px; object-fit: cover; border-radius: 6px; background: #2a2a2a; flex-shrink: 0; box-shadow: 0 4px 14px rgba(0,0,0,0.5); }
    #ab-modal-info { min-width: 0; }
    #ab-modal-name { margin: 0 0 8px; font-size: 1.8rem; line-height: 1.2; overflow-wrap: anywhere; }
    #ab-modal-count { color: #888; font-size: 0.95rem; margin-bottom: 4px; }
    #ab-modal-birth { color: #999; font-size: 0.9rem; margin-bottom: 14px; }
    #ab-modal-bio { color: #ccc; font-size: 0.95rem; line-height: 1.5; max-height: 220px; overflow-y: auto; white-space: pre-line; }
    #ab-modal-filmo-title { font-size: 1.2rem; margin: 6px 0 14px; color: #eee; }
    #ab-modal-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 14px; list-style: none; padding: 0; margin: 0; }
    #ab-modal-list li { min-width: 0; }
    #ab-page .ab-modal-poster-card { display: block; text-decoration: none; color: #ccc; }
    #ab-page .ab-modal-poster-img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 5px; background: #2a2a2a; display: block; }
    #ab-page .ab-modal-poster-placeholder { width: 100%; aspect-ratio: 2/3; border-radius: 5px; background: #252525; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #555; }
    #ab-page .ab-modal-poster-title { font-size: 0.82rem; margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #ab-page .ab-modal-poster-year { font-size: 0.75rem; color: #888; }
    #ab-page .ab-modal-poster-card:hover .ab-modal-poster-title { color: #0097e6; }
    #ab-page .ab-role { color: #777; }

    @media (max-width: 767px), (max-width: 1023px) and (max-height: 767px) {
        #ab-header { position: relative; top: auto; left: auto; right: auto; padding: 7px 12px 6px; }
        #ab-search-row { display: flex; flex-wrap: wrap; gap: 6px; }
        #ab-search { display: none; order: 3; flex: 0 0 100%; width: 100%; min-width: 0; height: 42px; font-size: 1rem; }
        #ab-header.filters-open #ab-search { display: block; }
        #ab-pager { order: 1; }
        #ab-page .ab-pg-btn { width: 34px; height: 34px; }
        #ab-pg-info { min-width: 48px; font-size: 0.8rem; }
        #ab-filter-toggle { display: inline-flex; order: 2; width: auto; margin: 0; gap: 4px; font-size: 0.85rem; }
        #ab-sort-wrap { display: none; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 6px; margin-top: 7px; }
        #ab-sort-wrap.open { display: grid; }
        #ab-settings-link, #ab-type-select, #ab-lib-wrap { grid-column: span 2; min-width: 0; }
        #ab-sort-app, #ab-sort-name { grid-column: span 3; min-width: 0; }
        #ab-lib-btn { width: 100%; overflow: hidden; text-overflow: ellipsis; }
        #ab-lib-panel { left: auto; right: 0; }
        #ab-page .ab-sort-btn, #ab-page .ab-type-select { min-height: 38px; padding: 6px 10px; font-size: 0.9rem; }
        #ab-status { min-height: 20px; padding-top: 2px; margin-top: 2px; font-size: 0.8rem; }
        #ab-grid { grid-template-columns: repeat(auto-fill, minmax(88px, 1fr)); gap: 8px; padding: 10px 12px 24px; margin-top: 0 !important; }
        #ab-page .ab-card-info { min-height: 50px; padding: 6px 7px; }
        #ab-page .ab-card-name { font-size: 0.8rem; }
        #ab-page .ab-card-count { font-size: 0.72rem; }
    }

    @media (max-width: 767px) and (orientation: portrait) {
        .skinHeader .pageTitle.ab-trombee-page-title { display: none; }
        #ab-compact-title {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            min-height: 28px; padding: 2px 0 6px; font-size: 1.05rem; font-weight: 600; line-height: 1.2;
        }
        #ab-page .ab-compact-title-icon { font-size: 1.1em; line-height: 1; }
    }

    @media (max-width: 600px) {
        #ab-overlay { padding: 10px 8px; }
        #ab-modal { width: 100%; padding: 20px 16px; }
        #ab-modal-header { gap: 14px; margin-bottom: 18px; padding-right: 24px; }
        #ab-modal-img { width: 112px; height: 168px; }
        #ab-modal-name { font-size: 1.45rem; }
        #ab-modal-bio { max-height: 160px; font-size: 0.9rem; }
        #ab-modal-list { grid-template-columns: repeat(auto-fill, minmax(88px, 1fr)); gap: 10px; }
    }

    @media (max-width: 420px) {
        #ab-settings-link, #ab-type-select { grid-column: span 3; }
        #ab-lib-wrap { grid-column: 1 / -1; }
        #ab-lib-panel { left: 0; right: 0; min-width: 0; }
        #ab-modal-img { width: 96px; height: 144px; }
    }

    @media (max-height: 600px) {
        #ab-overlay { padding: 8px; }
        #ab-modal { padding: 16px; }
        #ab-modal-header { margin-bottom: 14px; }
        #ab-modal-img { width: 96px; height: 144px; }
        #ab-modal-bio { max-height: 96px; }
    }
</style>

    <div id="ab-header">
        <div id="ab-compact-title" role="heading" aria-level="1">
            <span class="ab-compact-title-icon" aria-hidden="true">&#127914;</span>
            <span>Trombee</span>
        </div>
        <div id="ab-search-row">
            <input type="text" id="ab-search" placeholder="Search actor&#8230;" autocomplete="off" aria-label="Search people" />
            <div id="ab-pager" role="navigation" aria-label="Result pages">
                <button class="ab-pg-btn" id="ab-pg-first" type="button" title="First page" aria-label="First page">|&#8249;</button>
                <button class="ab-pg-btn" id="ab-pg-prev" type="button" title="Previous page" aria-label="Previous page">&#8249;</button>
                <span id="ab-pg-info">&#8211;</span>
                <button class="ab-pg-btn" id="ab-pg-next" type="button" title="Next page" aria-label="Next page">&#8250;</button>
                <button class="ab-pg-btn" id="ab-pg-last" type="button" title="Last page" aria-label="Last page">&#8250;|</button>
            </div>
            <button id="ab-filter-toggle" type="button" aria-label="Filters and sort" aria-expanded="false" aria-controls="ab-sort-wrap">
                <span aria-hidden="true">&#9776;</span>
                <span>Filters</span>
                <span class="ab-filter-chevron" aria-hidden="true">&#8964;</span>
            </button>
        </div>
        <div id="ab-sort-wrap">
            <button class="ab-sort-btn" id="ab-settings-link" type="button">&#9881; Settings</button>
            <select id="ab-type-select" class="ab-type-select" aria-label="Person type">
                <option value="Actor" selected>Actor</option>
                <option value="Director">Director</option>
                <option value="Composer">Composer</option>
                <option value="Writer">Writer</option>
                <option value="GuestStar">Guest Star</option>
                <option value="Producer">Producer</option>
                <option value="Conductor">Conductor</option>
                <option value="Lyricist">Lyricist</option>
                <option value="Arranger">Arranger</option>
                <option value="Engineer">Engineer</option>
                <option value="Mixer">Mixer</option>
                <option value="Remixer">Remixer</option>
                <option value="Creator">Creator</option>
                <option value="Artist">Artist</option>
                <option value="AlbumArtist">Album Artist</option>
                <option value="Author">Author</option>
                <option value="Illustrator">Illustrator</option>
                <option value="Penciller">Penciller</option>
                <option value="Inker">Inker</option>
                <option value="Colorist">Colorist</option>
                <option value="Letterer">Letterer</option>
                <option value="CoverArtist">Cover Artist</option>
                <option value="Editor">Editor</option>
                <option value="Translator">Translator</option>
            </select>
            <div id="ab-lib-wrap" class="ab-lib-wrap">
                <button class="ab-sort-btn" id="ab-lib-btn" type="button" aria-expanded="false" aria-controls="ab-lib-panel">&#128193; Libraries: All</button>
                <div id="ab-lib-panel" class="ab-lib-panel"></div>
            </div>
            <button class="ab-sort-btn active" id="ab-sort-app" type="button" aria-pressed="true">Appearances &#8595;</button>
            <button class="ab-sort-btn" id="ab-sort-name" type="button" aria-pressed="false">Name A&#8594;Z</button>
        </div>
        <div id="ab-status">Waiting&#8230;</div>
    </div>

    <div id="ab-grid"></div>

    <div id="ab-overlay" role="dialog" aria-modal="true" aria-labelledby="ab-modal-name">
        <div id="ab-modal">
            <button id="ab-modal-close" type="button" aria-label="Close actor details">&#10005;</button>
            <div id="ab-modal-header">
                <img id="ab-modal-img" alt="" />
                <div id="ab-modal-info">
                    <h2 id="ab-modal-name"></h2>
                    <div id="ab-modal-count"></div>
                    <div id="ab-modal-birth"></div>
                    <div id="ab-modal-bio"></div>
                </div>
            </div>
            <h3 id="ab-modal-filmo-title">Filmography</h3>
            <ul id="ab-modal-list"></ul>
        </div>
    </div>

    <script type="text/javascript">
    (function () {
        'use strict';
        var PAGE_SIZE = 60, allActors = [], currentSort = 'appearances';
        var searchTerm = '', currentPage = 0, filteredActors = [], searchTimer = null;
        var lastFocusedElement = null, resizeFrame = null;
        var trombeeHost = null, topBarTitle = null, trombeeBackBound = false;

        function esc(s) {
            return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }
        // Detects Trombee's Plugin Pages route even when Jellyfin URL-encodes the page URL.
        function isTrombeeRoute() {
            var hash = window.location.hash;
            try { hash = decodeURIComponent(hash); } catch (e) { /* use the undecoded hash */ }
            return hash.indexOf('pageUrl=/Trombee/Pages/Browse') !== -1;
        }
        // Makes one header Back click skip Plugin Pages' duplicate Trombee history entry.
        function handleTrombeeBack(e) {
            var button = e.target && e.target.closest
                ? e.target.closest('.skinHeader .headerBackButton')
                : null;
            if (!button || !isTrombeeRoute()) { return; }
            e.preventDefault();
            e.stopPropagation();
            e.stopImmediatePropagation();

            var currentUrl = window.location.href;
            var traversalHandled = false;
            var handleTraversal = function () {
                traversalHandled = true;
                if (window.location.href === currentUrl && isTrombeeRoute()) {
                    window.history.back();
                }
            };
            window.addEventListener('popstate', handleTraversal, { once: true });
            window.history.back();
            // Plugin Pages navigates its sidebar link twice. Skip only the duplicate
            // entry, identified by the first back leaving us on the exact same URL.
            window.setTimeout(function () {
                if (traversalHandled) { return; }
                window.removeEventListener('popstate', handleTraversal);
                if (window.location.href === currentUrl && isTrombeeRoute()) {
                    window.history.back();
                }
            }, 500);
        }
        // Delegates Back clicks because Jellyfin may replace the header button during SPA navigation.
        function bindTrombeeBackButton() {
            if (trombeeBackBound) { return; }
            document.addEventListener('click', handleTrombeeBack, true);
            trombeeBackBound = true;
        }
        // Removes the delegated Back handler as soon as Trombee is no longer active.
        function unbindTrombeeBackButton() {
            if (!trombeeBackBound) { return; }
            document.removeEventListener('click', handleTrombeeBack, true);
            trombeeBackBound = false;
        }
        // Applies Trombee-only host styling and replaces Jellyfin's page title while this route is active.
        function activateTrombeeShell() {
            var page = document.getElementById('ab-page');
            if (page && page.parentElement) {
                if (trombeeHost && trombeeHost !== page.parentElement) {
                    trombeeHost.classList.remove('ab-trombee-host');
                }
                trombeeHost = page.parentElement;
                trombeeHost.classList.add('ab-trombee-host');
            }

            bindTrombeeBackButton();
            var title = document.querySelector('.skinHeader .pageTitle');
            if (!title) { return; }
            topBarTitle = title;

            var icon = document.createElement('span');
            icon.className = 'ab-trombee-title-icon';
            icon.setAttribute('aria-hidden', 'true');
            icon.textContent = '\uD83C\uDFAA';
            var label = document.createElement('span');
            label.textContent = 'Trombee';
            title.replaceChildren(icon, label);
            title.classList.add('ab-trombee-page-title');
        }
        // Removes Trombee's shared-shell changes before Jellyfin renders the destination route.
        function deactivateTrombeeShell() {
            if (trombeeHost) {
                trombeeHost.classList.remove('ab-trombee-host');
                trombeeHost = null;
            }
            if (topBarTitle) {
                if (topBarTitle.classList.contains('ab-trombee-page-title') ||
                    topBarTitle.classList.contains('pageTitleWithLogo')) {
                    topBarTitle.replaceChildren();
                }
                topBarTitle.classList.remove('ab-trombee-page-title');
                topBarTitle = null;
            }
            unbindTrombeeBackButton();
            var overlay = document.getElementById('ab-overlay');
            if (overlay) { overlay.classList.remove('open'); }
        }
        function personImgUrl(id) {
            if (!id) { return ''; }
            try { return ApiClient.getUrl('Items/'+id+'/Images/Primary',{maxWidth:300,quality:80}); }
            catch(e) { return window.location.origin+'/Items/'+id+'/Images/Primary?maxWidth=300&quality=80'; }
        }
        function getFiltered() {
            var term = searchTerm.toLowerCase().trim();
            var list = term ? allActors.filter(function(a){return a.name.toLowerCase().indexOf(term)!==-1;}) : allActors;
            return list.slice().sort(function(a,b){
                return currentSort==='appearances' ? (b.appearances-a.appearances)||a.name.localeCompare(b.name) : a.name.localeCompare(b.name);
            });
        }
        function makeCard(actor) {
            var card = document.createElement('div');
            card.className = 'ab-card'; card.tabIndex = 0;
            card.setAttribute('role', 'button');
            card.setAttribute('aria-label', actor.name + ', ' + actor.appearances + ' title' + (actor.appearances === 1 ? '' : 's'));
            var url = personImgUrl(actor.personId);
            card.innerHTML =
                (url ? '<img class="ab-card-img" src="'+esc(url)+'" loading="lazy" alt="">' : '<div class="ab-card-placeholder">&#128100;</div>') +
                '<div class="ab-card-info"><div class="ab-card-name">'+esc(actor.name)+'</div>' +
                '<div class="ab-card-count">'+actor.appearances+' title'+(actor.appearances===1?'':'s')+'</div></div>';
            var image = card.querySelector('.ab-card-img');
            if (image) {
                image.addEventListener('error', function () {
                    var placeholder = document.createElement('div');
                    placeholder.className = 'ab-card-placeholder';
                    placeholder.innerHTML = '&#128100;';
                    this.replaceWith(placeholder);
                });
            }
            card.addEventListener('click', function(){lastFocusedElement=card;openActor(actor);});
            card.addEventListener('keydown', function(e){ if(e.key==='Enter'||e.key===' '){e.preventDefault();lastFocusedElement=card;openActor(actor);} });
            return card;
        }
        function openActor(actor) {
            openModal(actor);
        }
        function updatePager() {
            var total = filteredActors.length;
            var totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
            document.getElementById('ab-pg-info').textContent = (currentPage+1)+' / '+totalPages;
            document.getElementById('ab-pg-first').disabled = (currentPage === 0);
            document.getElementById('ab-pg-prev').disabled  = (currentPage === 0);
            document.getElementById('ab-pg-next').disabled  = (currentPage >= totalPages - 1);
            document.getElementById('ab-pg-last').disabled  = (currentPage >= totalPages - 1);
            var from = total === 0 ? 0 : currentPage * PAGE_SIZE + 1;
            var to   = Math.min((currentPage+1) * PAGE_SIZE, total);
            var txt  = total === 0 ? 'No results.' :
                'Actors '+from+'\u2013'+to+' of '+total+
                (total < allActors.length ? ' (filtered from '+allActors.length+' total)' : '')+'.';
            document.getElementById('ab-status').textContent = txt;
        }
        function scrollToTop() {
            var el = document.getElementById('ab-grid');
            while (el && el !== document.body) {
                el = el.parentElement;
                if (!el) { break; }
                var st = window.getComputedStyle(el);
                if (/auto|scroll/.test(st.overflow + st.overflowY) && el.scrollHeight > el.clientHeight) {
                    el.scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        function renderPage() {
            var grid = document.getElementById('ab-grid');
            grid.innerHTML = '';
            var slice = filteredActors.slice(currentPage*PAGE_SIZE, (currentPage+1)*PAGE_SIZE);
            var frag = document.createDocumentFragment();
            slice.forEach(function(a){ frag.appendChild(makeCard(a)); });
            grid.appendChild(frag);
            updatePager();
            scrollToTop();
        }
        function refresh() {
            currentPage = 0;
            filteredActors = getFiltered();
            renderPage();
        }
        function itemPosterUrl(itemId) {
            try { return ApiClient.getUrl('Items/'+itemId+'/Images/Primary',{maxWidth:220,quality:80}); }
            catch(e) { return window.location.origin+'/Items/'+itemId+'/Images/Primary?maxWidth=220&quality=80'; }
        }
        function openModal(actor) {
            document.getElementById('ab-modal-name').textContent=actor.name;
            var countText = actor.appearances+' appearance'+(actor.appearances===1?'':'s');
            if (getSelectedLibraryIds()) { countText += ' (filtered by library)'; }
            document.getElementById('ab-modal-count').textContent=countText;
            var img=document.getElementById('ab-modal-img'), url=personImgUrl(actor.personId);
            img.alt = actor.name;
            img.onerror = function () { this.style.display = 'none'; };
            img.onload = function () { this.style.display = ''; };
            if (url) { img.style.display = ''; img.src = url; }
            else { img.style.display = 'none'; img.removeAttribute('src'); }

            var birthEl = document.getElementById('ab-modal-birth');
            var bioEl = document.getElementById('ab-modal-bio');
            birthEl.textContent = '';
            bioEl.textContent = '';

            if (actor.personId) {
                try {
                    var userId = ApiClient.getCurrentUserId ? ApiClient.getCurrentUserId() : null;
                    (userId ? ApiClient.getItem(userId, actor.personId) : Promise.reject())
                        .then(function (person) {
                            if (person.PremiereDate) {
                                var d = new Date(person.PremiereDate);
                                if (!isNaN(d)) {
                                    birthEl.textContent = 'Born ' + d.toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
                                }
                            }
                            if (person.Overview) { bioEl.textContent = person.Overview; }
                        })
                        ['catch'](function () { /* bio/birth date unavailable, ignore */ });
                } catch (e) { /* ApiClient.getItem unavailable, ignore */ }
            }

            var list=document.getElementById('ab-modal-list'); list.innerHTML='';
            (actor.items||[]).slice().sort(function(a,b){ return (b.year||0)-(a.year||0); }).forEach(function(item){
                var li=document.createElement('li');
                var posterUrl = itemPosterUrl(item.itemId);
                var titleAttr = esc(item.itemName) + (item.year ? ' (' + item.year + ')' : '');
                li.innerHTML =
                    '<a class="ab-modal-poster-card" href="#" data-item-id="'+esc(item.itemId)+'" title="'+titleAttr+'">' +
                    (posterUrl
                        ? '<img class="ab-modal-poster-img" src="'+esc(posterUrl)+'" loading="lazy" alt="">'
                        : '<div class="ab-modal-poster-placeholder">&#127916;</div>') +
                    '<div class="ab-modal-poster-title">'+esc(item.itemName)+'</div>' +
                    (item.year ? '<div class="ab-modal-poster-year">'+item.year+'</div>' : '') +
                    '</a>';
                list.appendChild(li);
                var posterImage = li.querySelector('.ab-modal-poster-img');
                if (posterImage) {
                    posterImage.addEventListener('error', function () {
                        var placeholder = document.createElement('div');
                        placeholder.className = 'ab-modal-poster-placeholder';
                        placeholder.innerHTML = '&#127916;';
                        this.replaceWith(placeholder);
                    });
                }
            });
            list.querySelectorAll('a[data-item-id]').forEach(function (a) {
                a.addEventListener('click', function (e) {
                    e.preventDefault();
                    var itemId = this.getAttribute('data-item-id');
                    var srv=''; try{srv=ApiClient.serverId();}catch(err){}
                    var path='/details?id='+itemId+(srv?'&serverId='+srv:'');
                    deactivateTrombeeShell();
                    if (window.Emby && window.Emby.Page && window.Emby.Page.show) { window.Emby.Page.show(path); }
                    else { window.location.hash=path; }
                });
            });

            document.getElementById('ab-overlay').classList.add('open');
            document.getElementById('ab-modal-close').focus();
        }
        // Closes actor details and returns keyboard focus to the actor card that opened it.
        function closeModal() {
            document.getElementById('ab-overlay').classList.remove('open');
            if (lastFocusedElement && document.documentElement.contains(lastFocusedElement)) {
                lastFocusedElement.focus();
            }
        }

        function setGridOffset() {
            var hdr = document.getElementById('ab-header');
            var grid = document.getElementById('ab-grid');
            if (!hdr || !grid) { return; }
            var compact = window.matchMedia('(max-width: 767px), (max-width: 1023px) and (max-height: 767px)').matches;
            var appHeader = document.querySelector('.skinHeader');
            var appHeaderBottom = appHeader ? appHeader.getBoundingClientRect().bottom : 0;
            hdr.style.marginTop = '0px';
            grid.style.marginTop = '0px';
            if (compact) {
                hdr.style.top = '';
                hdr.style.marginTop = (Math.ceil(appHeaderBottom - hdr.getBoundingClientRect().top) - 1) + 'px';
                return;
            }
            hdr.style.top = (Math.ceil(appHeaderBottom) - 1) + 'px';
            var gridTop = grid.getBoundingClientRect().top;
            var headerBottom = hdr.getBoundingClientRect().bottom;
            grid.style.marginTop = Math.max(0, Math.ceil(headerBottom - gridTop)) + 'px';
        }

        function init() {
            activateTrombeeShell();
            var totalPages = function(){ return Math.max(1, Math.ceil(filteredActors.length/PAGE_SIZE)); };
            document.getElementById('ab-pg-first').addEventListener('click', function(){ currentPage=0; renderPage(); });
            document.getElementById('ab-pg-prev').addEventListener('click',  function(){ if(currentPage>0){currentPage--;renderPage();} });
            document.getElementById('ab-pg-next').addEventListener('click',  function(){ if(currentPage<totalPages()-1){currentPage++;renderPage();} });
            document.getElementById('ab-pg-last').addEventListener('click',  function(){ currentPage=totalPages()-1; renderPage(); });
            document.getElementById('ab-search').addEventListener('input', function(){
                var val=this.value; clearTimeout(searchTimer);
                searchTimer=setTimeout(function(){searchTerm=val;refresh();},260);
            });
            document.getElementById('ab-sort-app').addEventListener('click', function(){
                currentSort='appearances';
                document.getElementById('ab-sort-app').classList.add('active');
                document.getElementById('ab-sort-name').classList.remove('active');
                document.getElementById('ab-sort-app').setAttribute('aria-pressed', 'true');
                document.getElementById('ab-sort-name').setAttribute('aria-pressed', 'false');
                refresh();
            });
            document.getElementById('ab-sort-name').addEventListener('click', function(){
                currentSort='name';
                document.getElementById('ab-sort-name').classList.add('active');
                document.getElementById('ab-sort-app').classList.remove('active');
                document.getElementById('ab-sort-name').setAttribute('aria-pressed', 'true');
                document.getElementById('ab-sort-app').setAttribute('aria-pressed', 'false');
                refresh();
            });
            document.getElementById('ab-modal-close').addEventListener('click', closeModal);
            document.getElementById('ab-overlay').addEventListener('click', function(e){ if(e.target===this){closeModal();} });
            document.addEventListener('keydown', function(e){ if(e.key==='Escape'||e.key==='XF86Back'){closeModal();} });
            document.getElementById('ab-settings-link').addEventListener('click', function() {
                var p = '/configurationpage?name=Trombee';
                if (window.Emby && window.Emby.Page && window.Emby.Page.show) { window.Emby.Page.show(p); }
                else { window.location.hash = p; }
            });
            document.getElementById('ab-type-select').addEventListener('change', function () {
                loadData();
            });
            document.getElementById('ab-filter-toggle').addEventListener('click', function () {
                var controls = document.getElementById('ab-sort-wrap');
                var isOpen = controls.classList.toggle('open');
                document.getElementById('ab-header').classList.toggle('filters-open', isOpen);
                this.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
                if (!isOpen) {
                    document.getElementById('ab-lib-panel').classList.remove('open');
                    document.getElementById('ab-lib-btn').setAttribute('aria-expanded', 'false');
                }
                setGridOffset();
            });
            document.getElementById('ab-lib-btn').addEventListener('click', function (e) {
                e.stopPropagation();
                var panel = document.getElementById('ab-lib-panel');
                var isOpen = panel.classList.toggle('open');
                this.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
            });
            document.addEventListener('click', function (e) {
                var wrap = document.getElementById('ab-lib-wrap');
                if (wrap && !wrap.contains(e.target)) {
                    document.getElementById('ab-lib-panel').classList.remove('open');
                    document.getElementById('ab-lib-btn').setAttribute('aria-expanded', 'false');
                }
            });
            loadLibraries();
            try {
                ApiClient.getCurrentUser().then(function (user) {
                    var isAdmin = !!(user && user.Policy && user.Policy.IsAdministrator);
                    if (!isAdmin) {
                        var btn = document.getElementById('ab-settings-link');
                        if (btn) { btn.style.display = 'none'; setGridOffset(); }
                    }
                })['catch'](function () {
                    // If we can't confirm admin status, hide the button to be safe.
                    var btn = document.getElementById('ab-settings-link');
                    if (btn) { btn.style.display = 'none'; setGridOffset(); }
                });
            } catch (e) {
                var btn = document.getElementById('ab-settings-link');
                if (btn) { btn.style.display = 'none'; setGridOffset(); }
            }
            setGridOffset();
            window.addEventListener('resize', function () {
                if (resizeFrame) { window.cancelAnimationFrame(resizeFrame); }
                resizeFrame = window.requestAnimationFrame(setGridOffset);
            });
            window.addEventListener('hashchange', function () {
                if (isTrombeeRoute()) {
                    window.setTimeout(activateTrombeeShell, 0);
                } else {
                    deactivateTrombeeShell();
                }
            });

            loadData();
        }

        function loadLibraries() {
            var url = ApiClient.getUrl('Trombee/libraries');
            fetch(url, { headers: { 'X-Emby-Authorization': 'MediaBrowser Token="'+ApiClient.accessToken()+'"' } })
                .then(function(r){ if(!r.ok){throw new Error('HTTP '+r.status);} return r.json(); })
                .then(function(result){
                    var libs = (result && result.libraries) || [];
                    var panel = document.getElementById('ab-lib-panel');
                    if (libs.length === 0) {
                        document.getElementById('ab-lib-wrap').style.display = 'none';
                        return;
                    }
                    var html = '<div class="ab-lib-row ab-lib-all-row">' +
                        '<input type="checkbox" id="ab-lib-all" checked>' +
                        '<label for="ab-lib-all">All libraries</label></div>' +
                        '<div class="ab-lib-sep"></div>';
                    libs.forEach(function (lib) {
                        html += '<div class="ab-lib-row">' +
                            '<input type="checkbox" id="ab-lib-' + esc(lib.id) + '" class="ab-lib-item" value="' + esc(lib.id) + '" checked>' +
                            '<label for="ab-lib-' + esc(lib.id) + '">' + esc(lib.name) + '</label></div>';
                    });
                    panel.innerHTML = html;

                    var allBox = document.getElementById('ab-lib-all');
                    var itemBoxes = panel.querySelectorAll('.ab-lib-item');

                    allBox.addEventListener('change', function () {
                        itemBoxes.forEach(function (cb) { cb.checked = allBox.checked; });
                        updateLibButtonLabel();
                        loadData();
                    });
                    itemBoxes.forEach(function (cb) {
                        cb.addEventListener('change', function () {
                            var allChecked = Array.prototype.every.call(itemBoxes, function (c) { return c.checked; });
                            allBox.checked = allChecked;
                            updateLibButtonLabel();
                            loadData();
                        });
                    });
                })
                ['catch'](function () {
                    document.getElementById('ab-lib-wrap').style.display = 'none';
                });
        }

        function updateLibButtonLabel() {
            var panel = document.getElementById('ab-lib-panel');
            var itemBoxes = panel.querySelectorAll('.ab-lib-item');
            var checked = Array.prototype.filter.call(itemBoxes, function (c) { return c.checked; });
            var btn = document.getElementById('ab-lib-btn');
            if (checked.length === 0 || checked.length === itemBoxes.length) {
                btn.textContent = '\uD83D\uDCC1 Libraries: All';
            } else if (checked.length === 1) {
                btn.textContent = '\uD83D\uDCC1 ' + checked[0].nextElementSibling.textContent;
            } else {
                btn.textContent = '\uD83D\uDCC1 Libraries: ' + checked.length + ' selected';
            }
        }

        function getSelectedLibraryIds() {
            var panel = document.getElementById('ab-lib-panel');
            if (!panel) { return null; }
            var itemBoxes = panel.querySelectorAll('.ab-lib-item');
            if (itemBoxes.length === 0) { return null; }
            var checked = Array.prototype.filter.call(itemBoxes, function (c) { return c.checked; });
            if (checked.length === 0 || checked.length === itemBoxes.length) { return null; }
            return checked.map(function (c) { return c.value; }).join(',');
        }

        function loadData() {
            var typeSelect = document.getElementById('ab-type-select');
            var personType = typeSelect ? typeSelect.value : 'Actor';
            var typeLabel = typeSelect ? typeSelect.options[typeSelect.selectedIndex].text : 'Actor';

            var statusEl = document.getElementById('ab-status');
            statusEl.textContent = 'Loading\u2026';
            document.getElementById('ab-search').placeholder = 'Search ' + typeLabel.toLowerCase() + '\u2026';

            var params = { personType: personType };
            var libraryIds = getSelectedLibraryIds();
            if (libraryIds) { params.libraryIds = libraryIds; }

            var url = ApiClient.getUrl('Trombee/actors-index', params);
            fetch(url, { headers: { 'X-Emby-Authorization': 'MediaBrowser Token="'+ApiClient.accessToken()+'"' } })
                .then(function(r){ if(!r.ok){throw new Error('HTTP '+r.status);} return r.json(); })
                .then(function(result){
                    allActors=(result&&result.actors)||[];
                    refresh();
                    setGridOffset();
                })
                ['catch'](function(err){ statusEl.textContent='Error: '+err; });
        }

        function initOnce() {
            var page = document.getElementById('ab-page');
            if (!page) { return; }
            activateTrombeeShell();
            if (page._trombeeInitialized) { return; }
            page._trombeeInitialized = true;
            init();
        }

        $('#ab-page').on('pageshow', initOnce);
        $('#ab-page').on('pagehide', deactivateTrombeeShell);
        // Fallback: 'pageshow' is a jQuery Mobile event fired by jellyfin-web's own page
        // navigation. When this page is instead loaded through the Plugin Pages plugin
        // (for non-admin users), that event may not fire, so we also bootstrap on
        // DOMContentLoaded, guarded above to avoid running init() twice.
        document.addEventListener('DOMContentLoaded', initOnce);
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            initOnce();
        }

    }());
    </script>

</div>

</body>
</html>
