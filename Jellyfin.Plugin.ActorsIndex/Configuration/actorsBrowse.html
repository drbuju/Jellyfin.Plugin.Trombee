<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trombee</title>
</head>
<body>

<div id="ab-page" data-role="page" class="page type-interior pluginConfigurationPage" data-require="emby-input,emby-button,emby-checkbox">

<style>
    .ai-section     { margin-top: 2em; }
    .ai-status      { margin-top: 1em; font-style: italic; }

    /* ── Controls row: search + sort + settings ── */
    .ai-controls-row {
        display: flex; align-items: flex-end; gap: 16px; flex-wrap: wrap;
        margin-top: 1em;
    }
    .ai-search-field { flex: 1; min-width: 200px; max-width: 360px; }
    .ai-sort-field    { min-width: 200px; }
    .ai-settings-btn  { margin-left: auto; }

    /* ── Actors table (same styling as the admin config page) ── */
    .ai-table-wrap       { margin-top: 1em; overflow-x: auto; }
    .ai-table-wrap.ai-hidden { display: none; }
    .ai-table            { width: 100%; border-collapse: collapse; font-size: 0.95em; }
    .ai-th               { text-align: left; padding: 6px 10px; border-bottom: 2px solid #555; }
    .ai-th--center       { text-align: center; width: 110px; }
    .ai-td               { padding: 6px 10px; vertical-align: top; cursor: pointer; }
    .ai-td--center       { text-align: center; padding: 6px 10px; vertical-align: top; }
    .ai-td--small        { padding: 6px 10px; vertical-align: top; font-size: 0.9em; }
    .ai-row:hover        { background: rgba(255,255,255,0.05); }
    .ai-link             { color: inherit; text-decoration: none; }
    .ai-link:hover        { color: #0097e6; }
    .ai-role             { color: #777; }

    /* ── Pager ── */
    .ai-pager { display: flex; align-items: center; gap: 8px; margin-top: 1em; }
    .ai-pg-info { color: #aaa; font-size: 0.9em; min-width: 60px; text-align: center; }
</style>

    <div data-role="content">
        <div class="content-primary">

            <div class="sectionTitleContainer flex align-items-center">
                <h2 class="sectionTitle">&#127914; Trombee<span id="ab-version" style="font-size:0.5em;opacity:0.5;margin-left:8px;"></span></h2>
            </div>

            <div class="verticalSection">
                <p>Browse all actors in your library, with appearance counts and titles.</p>
            </div>

            <div class="ai-controls-row">
                <div class="inputContainer ai-search-field">
                    <label class="inputLabel inputLabelUnfocused" for="ab-search">Search</label>
                    <!-- is="emby-input" is required by the Jellyfin web framework -->
                    <input is="emby-input" type="text" id="ab-search" placeholder="Actor name&#8230;" autocomplete="off" />
                </div>
                <div class="selectContainer ai-sort-field">
                    <label class="selectLabel" for="ab-sort">Sort by</label>
                    <!-- is="emby-select" is required by the Jellyfin web framework -->
                    <select is="emby-select" id="ab-sort" class="emby-select">
                        <option value="appearances">Appearances (most first)</option>
                        <option value="name">Name (A&#8594;Z)</option>
                    </select>
                </div>
                <!-- is="emby-button" is required by the Jellyfin web framework -->
                <button is="emby-button" type="button" id="ab-settings-link" class="raised emby-button ai-settings-btn">
                    <span>&#9881; Settings</span>
                </button>
            </div>

            <div id="ab-status" class="ai-status">Waiting&#8230;</div>

            <div id="ab-table-wrap" class="ai-table-wrap ai-hidden">
                <table class="ai-table">
                    <thead>
                        <tr>
                            <th class="ai-th">Actor</th>
                            <th class="ai-th ai-th--center">Appearances</th>
                            <th class="ai-th">Titles</th>
                        </tr>
                    </thead>
                    <tbody id="ab-table-body"></tbody>
                </table>
            </div>

            <div class="ai-pager">
                <!-- is="emby-button" is required by the Jellyfin web framework -->
                <button is="emby-button" type="button" class="raised emby-button" id="ab-pg-first" title="First page">|&#8249;</button>
                <button is="emby-button" type="button" class="raised emby-button" id="ab-pg-prev"  title="Previous">&#8249;</button>
                <span class="ai-pg-info" id="ab-pg-info">&#8211;</span>
                <button is="emby-button" type="button" class="raised emby-button" id="ab-pg-next"  title="Next">&#8250;</button>
                <button is="emby-button" type="button" class="raised emby-button" id="ab-pg-last"  title="Last page">&#8250;|</button>
            </div>

        </div>
    </div>

    <script type="text/javascript">
    (function () {
        'use strict';
        var PAGE_SIZE = 60, allActors = [], currentSort = 'appearances';
        var searchTerm = '', currentPage = 0, filteredActors = [], searchTimer = null;
        var MAX_TITLES = 6;

        function esc(s) {
            return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function detailsUrl(itemId) {
            var srv = ''; try { srv = ApiClient.serverId(); } catch (e) { /* noop */ }
            return '/details?id=' + itemId + (srv ? '&serverId=' + srv : '');
        }

        function openActor(actor) {
            if (!actor.personId) { return; }
            var path = detailsUrl(actor.personId);
            if (window.Emby && window.Emby.Page && window.Emby.Page.show) { window.Emby.Page.show(path); }
            else { window.location.hash = path; }
        }

        function getFiltered() {
            var term = searchTerm.toLowerCase().trim();
            var list = term ? allActors.filter(function (a) { return a.name.toLowerCase().indexOf(term) !== -1; }) : allActors;
            return list.slice().sort(function (a, b) {
                return currentSort === 'appearances'
                    ? (b.appearances - a.appearances) || a.name.localeCompare(b.name)
                    : a.name.localeCompare(b.name);
            });
        }

        function makeTitlesHtml(actor) {
            var shown = (actor.items || []).slice(0, MAX_TITLES);
            var html = shown.map(function (i) {
                var url = detailsUrl(i.itemId);
                var label = esc(i.itemName) + (i.role ? ' <em class="ai-role">&#8212; ' + esc(i.role) + '</em>' : '');
                return '<a href="#" class="ai-link" data-item-id="' + esc(i.itemId) + '">' + label + '</a>';
            }).join(', ');
            if (actor.items && actor.items.length > MAX_TITLES) {
                html += '&nbsp;<em>&#8230; and ' + (actor.items.length - MAX_TITLES) + ' more</em>';
            }
            return html;
        }

        function makeRow(actor) {
            var tr = document.createElement('tr');
            tr.className = 'ai-row';
            tr.innerHTML =
                '<td class="ai-td">' + esc(actor.name) + '</td>' +
                '<td class="ai-td--center">' + actor.appearances + '</td>' +
                '<td class="ai-td--small">' + makeTitlesHtml(actor) + '</td>';

            tr.addEventListener('click', function (e) {
                var link = e.target.closest ? e.target.closest('a[data-item-id]') : null;
                if (link) {
                    e.preventDefault();
                    var path = detailsUrl(link.getAttribute('data-item-id'));
                    if (window.Emby && window.Emby.Page && window.Emby.Page.show) { window.Emby.Page.show(path); }
                    else { window.location.hash = path; }
                    return;
                }
                openActor(actor);
            });
            return tr;
        }

        function updatePager() {
            var total = filteredActors.length;
            var totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
            document.getElementById('ab-pg-info').textContent = (currentPage + 1) + ' / ' + totalPages;
            document.getElementById('ab-pg-first').disabled = (currentPage === 0);
            document.getElementById('ab-pg-prev').disabled = (currentPage === 0);
            document.getElementById('ab-pg-next').disabled = (currentPage >= totalPages - 1);
            document.getElementById('ab-pg-last').disabled = (currentPage >= totalPages - 1);
            var from = total === 0 ? 0 : currentPage * PAGE_SIZE + 1;
            var to = Math.min((currentPage + 1) * PAGE_SIZE, total);
            var txt = total === 0 ? 'No results.' :
                'Actors ' + from + '\u2013' + to + ' of ' + total +
                (total < allActors.length ? ' (filtered from ' + allActors.length + ' total)' : '') + '.';
            document.getElementById('ab-status').textContent = txt;
        }

        function renderPage() {
            var body = document.getElementById('ab-table-body');
            var wrap = document.getElementById('ab-table-wrap');
            body.innerHTML = '';
            var slice = filteredActors.slice(currentPage * PAGE_SIZE, (currentPage + 1) * PAGE_SIZE);
            var frag = document.createDocumentFragment();
            slice.forEach(function (a) { frag.appendChild(makeRow(a)); });
            body.appendChild(frag);
            wrap.classList.toggle('ai-hidden', filteredActors.length === 0);
            updatePager();
        }

        function refresh() {
            currentPage = 0;
            filteredActors = getFiltered();
            renderPage();
        }

        function init() {
            var totalPages = function () { return Math.max(1, Math.ceil(filteredActors.length / PAGE_SIZE)); };

            document.getElementById('ab-pg-first').addEventListener('click', function () { currentPage = 0; renderPage(); });
            document.getElementById('ab-pg-prev').addEventListener('click', function () { if (currentPage > 0) { currentPage--; renderPage(); } });
            document.getElementById('ab-pg-next').addEventListener('click', function () { if (currentPage < totalPages() - 1) { currentPage++; renderPage(); } });
            document.getElementById('ab-pg-last').addEventListener('click', function () { currentPage = totalPages() - 1; renderPage(); });

            document.getElementById('ab-search').addEventListener('input', function () {
                var val = this.value; clearTimeout(searchTimer);
                searchTimer = setTimeout(function () { searchTerm = val; refresh(); }, 260);
            });

            document.getElementById('ab-sort').addEventListener('change', function () {
                currentSort = this.value;
                refresh();
            });

            document.getElementById('ab-settings-link').addEventListener('click', function () {
                var p = '/configurationpage?name=Trombee';
                if (window.Emby && window.Emby.Page && window.Emby.Page.show) { window.Emby.Page.show(p); }
                else { window.location.hash = p; }
            });

            var statusEl = document.getElementById('ab-status');
            statusEl.textContent = 'Loading\u2026';
            var url = ApiClient.getUrl('Trombee/actors-index');
            fetch(url, { headers: { 'X-Emby-Authorization': 'MediaBrowser Token="' + ApiClient.accessToken() + '"' } })
                .then(function (r) { if (!r.ok) { throw new Error('HTTP ' + r.status); } return r.json(); })
                .then(function (result) {
                    allActors = (result && result.actors) || [];
                    if (allActors.length === 0) { statusEl.textContent = 'No actors found.'; }
                    else { refresh(); }
                })
                ['catch'](function (err) { statusEl.textContent = 'Error: ' + err; });
        }

        $('#ab-page').on('pageshow', init);

    }());
    </script>

</div>

</body>
</html>
