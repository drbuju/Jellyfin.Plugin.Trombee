description: >
  Actors Index scans your Jellyfin library and builds a full-screen browsable grid of all
  actors and actresses, showing how many titles each one appears in.
  Features include real-time search, pagination, sort by appearances or name,
  a Jellyfin channel integration, and a floating home button injectable into the Jellyfin UI.
